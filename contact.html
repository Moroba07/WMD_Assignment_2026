<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowState — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ─── Navigation ─── -->
<nav>
  <a href="index.html" class="nav-logo">⚡ Flow<span>State</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="productivity.html">Productivity</a></li>
    <li><a href="wellness.html">Wellness</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a>
  <a href="productivity.html">Productivity</a>
  <a href="wellness.html">Wellness</a>
  <a href="about.html">About</a>
  <a href="contact.html" class="active">Contact</a>
</div>

<!-- ─── Main Content ─── -->
<main>

  <div class="page-title">
    <h1>Contact</h1>
    <p>Got feedback or questions? We would love to hear from you.</p>
  </div>

  <!-- Form (shown by default) -->
  <div id="formContainer">
    <form class="contact-form" id="contactForm" novalidate>

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required />
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required />
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Your feedback..." required></textarea>
      </div>

      <button type="submit" class="btn" style="align-self:flex-start;">
        Send Feedback
      </button>

    </form>
  </div>

  <!-- Success message (hidden by default) -->
  <div id="successBox" class="success-box" style="display:none;">
    <h3>Thanks for reaching out! 🎉</h3>
    <p>We will get back to you soon.</p>
    <button class="btn" style="margin-top:1.5rem;" onclick="resetForm()">Send another</button>
  </div>

</main>

<footer>
  <p>© 2025 FlowState · Photos by <a href="https://unsplash.com" target="_blank" rel="noopener">Unsplash</a></p>
</footer>

<script>
  /* ─── Nav hamburger ─── */
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
  });
  mobileMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => {
    hamburger.classList.remove('open'); mobileMenu.classList.remove('open');
  }));

  /* ─── Form submit ─── */
  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name    = document.getElementById('name').value.trim();
    const email   = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();
    if (!name || !email || !message) return;

    // Show success state
    document.getElementById('formContainer').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  });

  function resetForm() {
    document.getElementById('contactForm').reset();
    document.getElementById('formContainer').style.display = 'block';
    document.getElementById('successBox').style.display = 'none';
  }
</script>

</body>
</html>
