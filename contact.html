<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flow State | Contact</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body data-page="contact">
  <canvas id="bg-canvas"></canvas>

  <header class="nav">
    <div class="nav-inner">
      <a class="nav-logo" href="home.html"><span class="logo-pulse"></span>Flow State</a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="home.html">Home</a>
        <a href="wellness.html">Wellness</a>
        <a href="productivity.html">Productivity</a>
        <a href="about.html">About</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
      <a class="nav-btn" href="home.html">Back home</a>
      <button class="hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
    </div>
  </header>

  <nav class="mob-nav" aria-label="Mobile navigation">
    <a href="home.html">Home</a>
    <a href="wellness.html">Wellness</a>
    <a href="productivity.html">Productivity</a>
    <a href="about.html">About</a>
    <a class="active" href="contact.html">Contact</a>
  </nav>

  <main>
    <section class="pg-hero">
      <div class="wrap">
        <span class="label">Contact</span>
        <h1 class="lg">Send a message.</h1>
        <p>Use this form for questions, feedback, or project updates.</p>
      </div>
    </section>

    <section>
      <div class="wrap contact-layout">
        <div class="contact-form-box">
          <form id="contactForm">
            <div class="fg">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required />
            </div>

            <div class="fg">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>

            <div class="fg">
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>

            <button class="btn btn-gold" type="submit">Send message</button>
          </form>

          <div class="form-success" id="formSuccess">
            Thanks. Your message was sent.
          </div>
        </div>

        <aside class="contact-info">
          <div class="ci-card">
            <div class="ci-ico">✉️</div>
            <div>
              <h5>Email</h5>
              <p>hello@flowstate.com</p>
            </div>
          </div>

          <div class="ci-card">
            <div class="ci-ico">📍</div>
            <div>
              <h5>Location</h5>
              <p>Student-friendly online support</p>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </main>
</body>
</html>
